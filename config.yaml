# Air Quality Home Monitor — edit pins to match your wiring (BCM numbers).
# BME680: I2C (SDA=GPIO2, SCL=GPIO3 on Pi). Connect 3.3V, GND, SDA, SCL.

# RGB LED (e.g. DIYables module: R, G, B to GPIO, common/cathode to GND; built-in resistors).
# Wiring: docs/rgb-led-wiring.md
# buzzer: BCM pin for the alarm (not the buzzer: section) — see docs/buzzer-wiring.md
# If your module is common anode, set common_anode: true.
gpio:
  rgb_red: 17
  rgb_green: 27
  rgb_blue: 22
  buzzer: 18
  common_anode: false

# Air quality: BME680 gas resistance (Ω) is higher when the air is “cleaner”
# (after the recommended ~48h burn-in). Adjust after calibration in your home.
# Score: linear map — below scale_min_ohms = score 0, at/above scale_max_ohms = 100.
# If the score is stuck (often at 100), your real readings may sit in a narrow range:
# set scale_max_ohms *above* the kΩ (×1000) you see on the “clean” / purifier-on runs,
# and scale_min_ohms near a “stuffy” or polluted value so the bar has room to move.
air_quality:
  # Minimum gas ohm to consider “readings stable”
  min_gas_ohms: 1000
  # When use_relative_score is false: good >= good_min, moderate in [moderate_min, good_min)
  # When use_relative_score is true: the LED / chip / buzzer use score_label_* on the 0-100
  # score; good_min / moderate_min do not set the text color (avoids e.g. score 30 with “good”).
  good_min: 20000
  moderate_min: 10000
  use_relative_score: true
  # 0-100 gas score: span (higher ohm = cleaner; tune to your room’s typical range)
  scale_min_ohms: 10000
  scale_max_ohms: 200000
  # If score is in [score_label_moderate_min, score_label_good_min) → “moderate”; if >= good →
  # “good”; else “bad”. Rough thirds of the dial: 0-33 / 34-66 / 67-100.
  score_label_good_min: 67
  score_label_moderate_min: 34
  # Seed value until the gas heater stabilizes; not used for the 0-100 line map above.
  baseline_ohms: 50000

# How local clock time maps to Morning / Lunch / Evening for charts and ranks
# (“Evening” in the app = this night window)
# (uses the Pi’s time zone; samples outside these windows are not counted on the graph).
# Times are half-open: from_hour is included, to_hour is excluded. If from_hour > to_hour,
# the range wraps (night example: 20 → 5 is 8pm–4:59am).
time_periods:
  order: [morning, lunch, night]
  labels:
    morning: "Morning"
    lunch: "Lunch"
    # Shown in charts, tables, and rankings (same time window as “night” below)
    night: "Evening"
  morning:
    from_hour: 5
    to_hour: 12
  lunch:
    from_hour: 12
    to_hour: 15
  night:
    from_hour: 20
    to_hour: 5

# Rooms for your experiment (select one in the web UI when you move the setup)
rooms:
  - "Master Bedroom"
  - "Kids Bedroom"
  - "Guest Room"
  - "Living Room"
  - "Kitchen"
  - "Garage"

# When air is bad, buzzer (see docs/buzzer-wiring.md). Passive piezo = use kind: passive.
buzzer:
  enabled: true
  # "passive" = needs a tone (PWM) — 5V piezo modules, Arduino-style buzzer boards.
  # "active" = internal oscillator, DC on GPIO only.
  kind: passive
  frequency_hz: 2500
  # Passive: base duty from volume, then × gain, then cap. Same values run in ./run and ./test_buzzer.
  # gain 3 = push drive ~3× before cap; max_pwm_duty prevents ~100% DC (inaudible on piezo).
  volume: 1.0
  gain: 3.0
  max_pwm_duty: 0.68
  # pattern: siren = two alternating tones (best for audiences) | continuous | pulsed
  pattern: siren
  # Siren only: low/high pitch (Hz) and how long each blast lasts (seconds).
  siren_freq_low: 2800
  siren_freq_high: 5200
  siren_step_seconds: 0.09
  beep_on: 0.4
  beep_off: 0.2
  repeat_every: 2.0

# Data files (local on the Pi — SQLite for charts; CSV is a second copy of each point)
data:
  # DB uses WAL + busy timeout in code (logger thread + /api/ charts share the file).
  sqlite_path: "data/readings.db"
  csv_path: "data/readings_log.csv"
  # How often to save one row (all sensor fields + room + time). 1800 = 30 minutes.
  log_interval_seconds: 1800

# Web dashboard (open from another device on the same network)
# Port 5000 is often taken on macOS (AirPlay) — 5001 is a safer default. Override with
# env SMARTAIR_PORT=8080
server:
  host: "0.0.0.0"
  port: 5001
  # When true, common OS “connectivity check” paths redirect to your dashboard
  # (use with ./setuphotspot and HOTSPOT_CAPTIVE=1 — see docs/pi-wifi-hotspot.md)
  captive_portal: false
  # How often the browser refetches /api/status (ms). Lower = quicker graph/number updates.
  live_poll_ms: 1000
  # If > 0, /api/status shows the *same* sensor values to all viewers, updated at most
  # this often (time buckets, aligned to the clock). 0 = always live, numbers may
  # differ between phones by a second. Use 30 so everyone in the room matches.
  display_sync_interval_seconds: 0

# Set true only to test the web UI without a sensor (uses fake numbers on the site).
# For your science project on the Pi, keep this false and do NOT set SENSORS_DRY_RUN=1.
sensors:
  dry_run: false
  # I2C bus for the GPIO header (SDA/SCL). Almost always 1 on Pi 3/4/5. If you get
  # "Unable to identify BME680 at 0x76 (IOError)", try 0 and run: i2cdetect -y 0  and  -y 1
  # Wiring + multimeter + ADDR/SDO: see docs/bme680-wiring.md
  i2c_bus: 1
  # BME680 IIR filter for T/pressure/humidity: 0 = fastest (see breath in humidity); 3 = smoother, slower
  iir_filter_size: 0
  # Pause after each successful read (seconds). Use ~0.4 with server.live_poll_ms ~400 for
  # a snappier live page (e.g. breath demo: humidity spikes first; see docs/bme680-wiring.md).
  read_interval_seconds: 1.0
